---
- name: Install and expose OpenShift CRC
  hosts: crc_hosts
  become: true
  gather_facts: true

  pre_tasks:
    - name: Assert Ubuntu target
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] == "Ubuntu"
        fail_msg: "This playbook currently supports fresh Ubuntu hosts only."

    - name: Assert pull secret exists on controller
      ansible.builtin.stat:
        path: "{{ crc_pull_secret_src }}"
      delegate_to: localhost
      become: false
      register: crc_pull_secret_stat
      no_log: true

    - name: Fail when pull secret is missing
      ansible.builtin.assert:
        that:
          - crc_pull_secret_stat.stat.exists
        fail_msg: "Set CRC_PULL_SECRET_PATH or place the pull secret at {{ crc_pull_secret_src }}"
      no_log: true

  tasks:
    - name: Install Ubuntu packages
      ansible.builtin.apt:
        name: "{{ crc_ubuntu_packages }}"
        state: present
        update_cache: true
      register: crc_package_install

    - name: Check whether KVM package reboot has already been done
      ansible.builtin.stat:
        path: /var/lib/crc-ansible/kvm-package-rebooted
      register: crc_kvm_reboot_marker

    - name: Ensure CRC Ansible state directory exists
      ansible.builtin.file:
        path: /var/lib/crc-ansible
        state: directory
        mode: "0755"

    - name: Reboot after KVM/libvirt package install
      ansible.builtin.reboot:
        reboot_timeout: 600
        connect_timeout: 10
        post_reboot_delay: 15
      when:
        - crc_reboot_after_package_install | bool
        - not crc_kvm_reboot_marker.stat.exists

    - name: Mark KVM package reboot complete
      ansible.builtin.file:
        path: /var/lib/crc-ansible/kvm-package-rebooted
        state: touch
        mode: "0644"
      when: crc_reboot_after_package_install | bool

    - name: Try to load KVM kernel modules
      ansible.builtin.shell: |
        set -euo pipefail
        modprobe kvm || true
        modprobe kvm_intel || modprobe kvm_amd || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Check KVM device after package install/module load
      ansible.builtin.stat:
        path: /dev/kvm
      register: crc_kvm_device

    - name: Report KVM availability before crc setup
      ansible.builtin.debug:
        msg: >-
          /dev/kvm {{ 'exists' if crc_kvm_device.stat.exists else 'is missing' }}.
          Continuing to crc setup so CRC performs its own official prerequisite checks.

    - name: Enable libvirt and NetworkManager
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - libvirtd
        - NetworkManager

    - name: Add CRC run user to virtualization groups
      ansible.builtin.user:
        name: "{{ crc_run_user }}"
        groups: kvm,libvirt
        append: true

    - name: Allow CRC run user passwordless sudo for CRC setup/start helpers
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/99-crc-{{ crc_run_user }}"
        mode: "0440"
        content: "{{ crc_run_user }} ALL=(root) NOPASSWD:ALL\n"
        validate: "visudo -cf %s"
      when: crc_allow_passwordless_sudo_for_setup | bool

    - name: Create CRC download directory
      ansible.builtin.file:
        path: "{{ crc_download_dir }}"
        state: directory
        owner: "{{ crc_run_user }}"
        group: "{{ crc_run_user }}"
        mode: "0755"

    - name: Create CRC user bin directory
      ansible.builtin.file:
        path: "{{ crc_user_bin_dir }}"
        state: directory
        owner: "{{ crc_run_user }}"
        group: "{{ crc_run_user }}"
        mode: "0755"

    - name: Download latest CRC archive
      become_user: "{{ crc_run_user }}"
      ansible.builtin.get_url:
        url: "{{ crc_archive_url }}"
        dest: "{{ crc_download_dir }}/{{ crc_tarball_name }}"
        mode: "0644"
      register: crc_archive_download

    - name: Check installed CRC executable
      ansible.builtin.stat:
        path: "{{ crc_command }}"
      register: crc_binary

    - name: Extract latest CRC archive and install executable into ~/bin
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        rm -rf "{{ crc_download_dir }}"/crc-linux-*-amd64
        tar xvf "{{ crc_download_dir }}/{{ crc_tarball_name }}" -C "{{ crc_download_dir }}"
        cp "{{ crc_download_dir }}"/crc-linux-*-amd64/crc "{{ crc_command }}"
        chmod 0755 "{{ crc_command }}"
      args:
        executable: /bin/bash
      when: crc_archive_download.changed or not crc_binary.stat.exists
      changed_when: true

    - name: Download latest OpenShift CLI archive
      become_user: "{{ crc_run_user }}"
      ansible.builtin.get_url:
        url: "{{ oc_archive_url }}"
        dest: "{{ crc_download_dir }}/{{ oc_tarball_name }}"
        mode: "0644"
      register: oc_archive_download

    - name: Check installed OpenShift CLI executable
      ansible.builtin.stat:
        path: "{{ oc_command }}"
      register: oc_binary

    - name: Extract latest OpenShift CLI into ~/bin
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        tar xvf "{{ crc_download_dir }}/{{ oc_tarball_name }}" -C "{{ crc_user_bin_dir }}" oc kubectl
        chmod 0755 "{{ crc_user_bin_dir }}/oc" "{{ crc_user_bin_dir }}/kubectl"
      args:
        executable: /bin/bash
      when: oc_archive_download.changed or not oc_binary.stat.exists
      changed_when: true

    - name: Add ~/bin to PATH in shell profile
      ansible.builtin.lineinfile:
        path: "{{ crc_run_home }}/.bashrc"
        line: 'export PATH=$PATH:$HOME/bin'
        owner: "{{ crc_run_user }}"
        group: "{{ crc_run_user }}"
        mode: "0644"
        create: true

    - name: Show CRC version
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command: "{{ crc_command }} version"
      register: crc_version_cmd
      changed_when: false

    - name: Show OpenShift CLI version
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command: "{{ oc_command }} version --client=true"
      register: oc_version_cmd
      changed_when: false

    - name: Allow CRC to bind privileged local ports in user network mode
      community.general.capabilities:
        path: "{{ crc_command }}"
        capability: cap_net_bind_service+ep
        state: present
      when: crc_network_mode == 'user'

    - name: Copy pull secret for CRC user
      ansible.builtin.copy:
        src: "{{ crc_pull_secret_src }}"
        dest: "{{ crc_pull_secret_dest }}"
        owner: "{{ crc_run_user }}"
        group: "{{ crc_run_user }}"
        mode: "0600"
      no_log: true

    - name: Configure CRC
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command: "{{ crc_command }} config set {{ item.key }} {{ item.value }}"
      loop:
        - { key: consent-telemetry, value: "no" }
        - { key: disable-update-check, value: "true" }
        - { key: preset, value: "openshift" }
        - { key: network-mode, value: "{{ crc_network_mode }}" }
        - { key: pull-secret-file, value: "{{ crc_pull_secret_dest }}" }
        - { key: cpus, value: "{{ crc_cpus }}" }
        - { key: memory, value: "{{ crc_memory_mib }}" }
        - { key: disk-size, value: "{{ crc_disk_size_gib }}" }
      changed_when: true

    - name: Run crc setup
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command: "{{ crc_command }} setup"
      register: crc_setup
      async: 7200
      poll: 30
      changed_when: "'already' not in (crc_setup.stdout | lower)"

    - name: Stop existing CRC before forced recreate
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command: "{{ crc_command }} stop"
      when: crc_force_recreate | bool
      failed_when: false
      changed_when: true

    - name: Delete existing CRC before forced recreate
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command: "{{ crc_command }} delete -f"
      when: crc_force_recreate | bool
      failed_when: false
      changed_when: true

    - name: Check CRC status
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command: "{{ crc_command }} status --log-level error"
      register: crc_status
      failed_when: false
      changed_when: false

    - name: Start CRC
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command: "{{ crc_command }} start -p {{ crc_pull_secret_dest }}"
      when: "'Running' not in crc_status.stdout"
      register: crc_start
      async: 7200
      poll: 30
      no_log: true

    - name: Get CRC IP
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command: "{{ crc_command }} ip"
      register: crc_ip_cmd
      changed_when: false

    - name: Store CRC IP fact
      ansible.builtin.set_fact:
        crc_vm_ip: "{{ crc_ip_cmd.stdout | trim }}"

    - name: Store proxy backend IP fact
      ansible.builtin.set_fact:
        crc_proxy_backend_ip: "{{ '127.0.0.1' if crc_network_mode == 'user' else crc_vm_ip }}"

    - name: Install dnsmasq CRC config before cluster domain changes
      ansible.builtin.template:
        src: dnsmasq-crc.conf.j2
        dest: /etc/dnsmasq.d/crc.conf
        mode: "0644"
      when: crc_enable_dnsmasq | bool
      notify: Restart dnsmasq

    - name: Enable dnsmasq before cluster domain changes
      ansible.builtin.systemd_service:
        name: dnsmasq
        state: started
        enabled: true
      when: crc_enable_dnsmasq | bool

    - name: Add exact custom CRC names to host resolver
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED CRC {{ crc_cluster_name }} DOMAINS"
        block: |
          127.0.0.1 {{ crc_api_alias }} {{ crc_console_alias }} {{ crc_oauth_alias }}
      when: crc_configure_custom_domains | bool

    - name: Apply DNS handler before cluster domain changes
      ansible.builtin.meta: flush_handlers

    - name: Wait for OpenShift API to answer
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        eval "$({{ crc_command }} oc-env)"
        {{ oc_command }} get clusterversion version -o name
      args:
        executable: /bin/bash
      register: crc_api_ready
      retries: 40
      delay: 15
      until: crc_api_ready.rc == 0
      changed_when: false

    - name: Configure cluster DNS forwarding for custom CRC domains
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        eval "$({{ crc_command }} oc-env)"
        "{{ oc_command }}" patch dns.operator/default --type=merge -p '{"spec":{"servers":[{"name":"{{ crc_cluster_name }}-custom-domains","zones":["{{ crc_api_domain }}","{{ crc_apps_domain }}"],"forwardPlugin":{"upstreams":["{{ crc_bind_address }}"]}}]}}'
      args:
        executable: /bin/bash
      when: crc_configure_custom_domains | bool
      changed_when: true

    - name: Wait for cluster DNS forwarding config
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        eval "$({{ crc_command }} oc-env)"
        "{{ oc_command }}" get dns.operator/default -o jsonpath='{.spec.servers[*].zones[*]}' | grep -qw '{{ crc_api_domain }}'
        "{{ oc_command }}" get dns.operator/default -o jsonpath='{.spec.servers[*].zones[*]}' | grep -qw '{{ crc_apps_domain }}'
      args:
        executable: /bin/bash
      register: crc_dns_forward_ready
      retries: 40
      delay: 15
      until: crc_dns_forward_ready.rc == 0
      changed_when: false
      when: crc_configure_custom_domains | bool

    - name: Generate custom domain certificate
      become_user: "{{ crc_run_user }}"
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -newkey
          - rsa:2048
          - -new
          - -nodes
          - -x509
          - -days
          - "3650"
          - -keyout
          - "{{ crc_run_home }}/.crc/{{ crc_cluster_name }}-domain.key"
          - -out
          - "{{ crc_run_home }}/.crc/{{ crc_cluster_name }}-domain.crt"
          - -subj
          - "/CN={{ crc_api_domain }}"
          - -addext
          - "subjectAltName=DNS:{{ crc_api_alias }},DNS:{{ crc_api_domain }},DNS:*.{{ crc_api_domain }},DNS:{{ crc_apps_domain }},DNS:*.{{ crc_apps_domain }}"
      when: crc_configure_custom_domains | bool
      changed_when: true

    - name: Apply custom domain TLS secret
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        eval "$({{ crc_command }} oc-env)"
        "{{ oc_command }}" create secret tls "{{ crc_domain_secret_name }}" \
          --cert="{{ crc_run_home }}/.crc/{{ crc_cluster_name }}-domain.crt" \
          --key="{{ crc_run_home }}/.crc/{{ crc_cluster_name }}-domain.key" \
          -n openshift-config \
          --dry-run=client -o yaml | "{{ oc_command }}" apply -f -
      args:
        executable: /bin/bash
      when: crc_configure_custom_domains | bool
      changed_when: true

    - name: Configure OpenShift custom API and apps domains
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        eval "$({{ crc_command }} oc-env)"
        cat > /tmp/crc-ingress-patch.yaml <<'EOF'
        spec:
          appsDomain: {{ crc_apps_domain }}
          componentRoutes:
          - hostname: {{ crc_console_alias }}
            name: console
            namespace: openshift-console
            servingCertKeyPairSecret:
              name: {{ crc_domain_secret_name }}
          - hostname: {{ crc_oauth_alias }}
            name: oauth-openshift
            namespace: openshift-authentication
            servingCertKeyPairSecret:
              name: {{ crc_domain_secret_name }}
        EOF
        "{{ oc_command }}" patch ingresses.config.openshift.io cluster --type=merge --patch-file=/tmp/crc-ingress-patch.yaml
        "{{ oc_command }}" patch apiserver cluster --type=merge -p '{"spec":{"servingCerts":{"namedCertificates":[{"names":["{{ crc_api_alias }}"],"servingCertificate":{"name":"{{ crc_domain_secret_name }}"}}]}}}'
      args:
        executable: /bin/bash
      when: crc_configure_custom_domains | bool
      changed_when: true

    - name: Remove legacy manually-created route aliases
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        eval "$({{ crc_command }} oc-env)"
        "{{ oc_command }}" -n openshift-console delete route "console-{{ crc_cluster_name }}" --ignore-not-found=true
        "{{ oc_command }}" -n openshift-authentication delete route "oauth-openshift-{{ crc_cluster_name }}" --ignore-not-found=true
      args:
        executable: /bin/bash
      when: crc_configure_custom_domains | bool
      changed_when: true

    - name: Wait for configured API, console, and OAuth domains
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        eval "$({{ crc_command }} oc-env)"
        test "$({{ oc_command }} get ingress.config.openshift.io cluster -o jsonpath='{.spec.appsDomain}')" = "{{ crc_apps_domain }}"
        test "$({{ oc_command }} get ingress.config.openshift.io cluster -o jsonpath='{.spec.componentRoutes[?(@.name=="console")].hostname}')" = "{{ crc_console_alias }}"
        test "$({{ oc_command }} get ingress.config.openshift.io cluster -o jsonpath='{.spec.componentRoutes[?(@.name=="oauth-openshift")].hostname}')" = "{{ crc_oauth_alias }}"
        {{ oc_command }} get apiserver cluster -o jsonpath='{.spec.servingCerts.namedCertificates[*].names[*]}' | grep -qw '{{ crc_api_alias }}'
      args:
        executable: /bin/bash
      register: crc_custom_domain_config
      retries: 40
      delay: 15
      until: crc_custom_domain_config.rc == 0
      changed_when: false
      when: crc_configure_custom_domains | bool

    - name: Verify OpenShift CLI can login as developer inside CRC host
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        rm -f "{{ crc_run_home }}/.crc-developer-kubeconfig"
        KUBECONFIG="{{ crc_run_home }}/.crc-developer-kubeconfig" \
          "{{ oc_command }}" login -u developer -p developer https://{{ crc_api_alias }}:6443 --insecure-skip-tls-verify=true
        test "$(KUBECONFIG="{{ crc_run_home }}/.crc-developer-kubeconfig" "{{ oc_command }}" whoami)" = developer
      args:
        executable: /bin/bash
      changed_when: false
      no_log: true

    - name: Verify console UI route is accessible
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        curl -kfsS --resolve "{{ crc_console_alias }}:443:127.0.0.1" \
          -o /tmp/crc-console-ui-test.html \
          "https://{{ crc_console_alias }}/"
        grep -q 'Red Hat OpenShift' /tmp/crc-console-ui-test.html
      args:
        executable: /bin/bash
      register: crc_console_ui_check
      retries: 40
      delay: 15
      until: crc_console_ui_check.rc == 0
      changed_when: false

    - name: Verify OAuth route health endpoint is accessible
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        test "$(curl -kfsS --resolve "{{ crc_oauth_alias }}:443:127.0.0.1" "https://{{ crc_oauth_alias }}/healthz")" = ok
      args:
        executable: /bin/bash
      register: crc_oauth_health_check
      retries: 40
      delay: 15
      until: crc_oauth_health_check.rc == 0
      changed_when: false

    - name: Wait for cluster operators to settle
      become_user: "{{ crc_run_user }}"
      ansible.builtin.shell: |
        set -euo pipefail
        eval "$({{ crc_command }} oc-env)"
        bad="$({{ oc_command }} get co --no-headers | awk '$3 != "True" || $4 != "False" || $5 != "False" {print}')"
        test -z "$bad"
      args:
        executable: /bin/bash
      register: crc_cluster_operators_ready
      retries: 60
      delay: 20
      until: crc_cluster_operators_ready.rc == 0
      changed_when: false

    - name: Install HAProxy config
      ansible.builtin.template:
        src: haproxy-crc.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        mode: "0644"
      when: crc_enable_haproxy | bool
      notify: Restart haproxy

    - name: Install dnsmasq CRC config
      ansible.builtin.template:
        src: dnsmasq-crc.conf.j2
        dest: /etc/dnsmasq.d/crc.conf
        mode: "0644"
      when: crc_enable_dnsmasq | bool
      notify: Restart dnsmasq

    - name: Enable HAProxy
      ansible.builtin.systemd_service:
        name: haproxy
        state: started
        enabled: true
      when: crc_enable_haproxy | bool

    - name: Enable dnsmasq
      ansible.builtin.systemd_service:
        name: dnsmasq
        state: started
        enabled: true
      when: crc_enable_dnsmasq | bool

    - name: Apply pending proxy and DNS handlers before controller-side verification
      ansible.builtin.meta: flush_handlers

    - name: Create local OpenShift CLI directory on Ansible controller
      ansible.builtin.file:
        path: "{{ local_oc_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false

    - name: Download OpenShift CLI on Ansible controller
      ansible.builtin.get_url:
        url: "{{ oc_archive_url }}"
        dest: "{{ local_oc_dir }}/{{ oc_tarball_name }}"
        mode: "0644"
      register: local_oc_archive_download
      delegate_to: localhost
      become: false

    - name: Check local OpenShift CLI executable
      ansible.builtin.stat:
        path: "{{ local_oc_command }}"
      register: local_oc_binary
      delegate_to: localhost
      become: false

    - name: Extract OpenShift CLI on Ansible controller
      ansible.builtin.command: >-
        tar xvf {{ local_oc_dir }}/{{ oc_tarball_name }} -C {{ local_oc_dir }} oc kubectl
      when: local_oc_archive_download.changed or not local_oc_binary.stat.exists
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Verify local OpenShift CLI can login through custom API domain
      ansible.builtin.shell: |
        set -euo pipefail
        rm -f "{{ playbook_dir }}/../.local/kubeconfig-{{ crc_cluster_name }}"
        KUBECONFIG="{{ playbook_dir }}/../.local/kubeconfig-{{ crc_cluster_name }}" \
          "{{ local_oc_command }}" login -u developer -p developer "https://{{ crc_api_alias }}:6443" --insecure-skip-tls-verify=true
        test "$(KUBECONFIG="{{ playbook_dir }}/../.local/kubeconfig-{{ crc_cluster_name }}" "{{ local_oc_command }}" whoami)" = developer
        KUBECONFIG="{{ playbook_dir }}/../.local/kubeconfig-{{ crc_cluster_name }}" \
          "{{ local_oc_command }}" get --raw=/version >/tmp/{{ crc_cluster_name }}-oc-version.json
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true

    - name: Verify custom domains from Ansible controller
      ansible.builtin.shell: |
        set -euo pipefail
        getent hosts "{{ crc_api_alias }}"
        getent hosts "test.{{ crc_api_domain }}"
        getent hosts "{{ crc_console_alias }}"
        getent hosts "test.{{ crc_apps_domain }}"
        curl -kfsS "https://{{ crc_api_alias }}:6443/version" >/tmp/{{ crc_cluster_name }}-api-version.json
        curl -kfsS -L "https://{{ crc_console_alias }}/" -o /tmp/{{ crc_cluster_name }}-console.html
        grep -q 'Red Hat OpenShift' /tmp/{{ crc_cluster_name }}-console.html
        test "$(curl -kfsS "https://{{ crc_oauth_alias }}/healthz")" = ok
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Render remote access summary
      ansible.builtin.template:
        src: crc-access.txt.j2
        dest: "{{ crc_run_home }}/crc-access-{{ crc_cluster_name }}.txt"
        owner: "{{ crc_run_user }}"
        group: "{{ crc_run_user }}"
        mode: "0600"

    - name: Show non-secret access summary
      ansible.builtin.debug:
        msg:
          - "CRC VM IP: {{ crc_vm_ip }}"
          - "DNS server: {{ crc_bind_address }}"
          - "API alias: https://{{ crc_api_alias }}:6443"
          - "Console alias: https://{{ crc_console_alias }}"
          - "Canonical CRC API: https://api.crc.testing:6443"
          - "Canonical CRC console: https://console-openshift-console.apps-crc.testing"

  handlers:
    - name: Restart haproxy
      ansible.builtin.systemd_service:
        name: haproxy
        state: restarted

    - name: Restart dnsmasq
      ansible.builtin.systemd_service:
        name: dnsmasq
        state: restarted
