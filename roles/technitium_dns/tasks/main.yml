---
- name: Skip Technitium DNS role when no API token is configured
  ansible.builtin.debug:
    msg: >-
      Technitium DNS role disabled. Set TECHNITIUM_DNS_API_TOKEN or
      technitium_dns_api_token to manage CRC wildcard DNS records.
  when: not (technitium_dns_enabled | bool)

- name: Assert Technitium DNS token is configured when role is enabled
  ansible.builtin.assert:
    that:
      - technitium_dns_api_token | length > 0
    fail_msg: >-
      Set TECHNITIUM_DNS_API_TOKEN or technitium_dns_api_token to configure
      Technitium DNS zones and records.
  when: technitium_dns_enabled | bool

- name: Read Technitium DNS API session and permissions
  delegate_to: localhost
  become: false
  ansible.builtin.uri:
    url: "{{ technitium_dns_base_url }}/api/user/session/get"
    method: GET
    headers:
      Authorization: "{{ 'Bearer ' ~ technitium_dns_api_token }}"
    validate_certs: "{{ technitium_dns_validate_certs }}"
    return_content: true
    status_code: 200
  register: technitium_dns_session
  no_log: true
  failed_when: false
  when: technitium_dns_enabled | bool

- name: Fail when Technitium DNS token cannot modify zones
  ansible.builtin.fail:
    msg: >-
      Technitium DNS token for user {{ technitium_dns_session.json.username | default('unknown') }}
      cannot modify zones. Required permission: Zones.{{ technitium_dns_required_zone_permission }}=true.
      Current Zones permissions: {{ technitium_dns_session.json.info.permissions.Zones | default({}) }}.
      Issue a token with Zones: Modify and Zone: Modify rights, then rerun.
  when:
    - technitium_dns_enabled | bool
    - >-
      not (
        technitium_dns_session.json.status | default('error') == 'ok' and
        technitium_dns_session.json.info.permissions.Zones[technitium_dns_required_zone_permission] | default(false) | bool
      )

- name: Configure Technitium DNS zones and records
  ansible.builtin.include_tasks: zone.yml
  loop: "{{ technitium_dns_zones }}"
  loop_control:
    loop_var: technitium_dns_zone
    label: "{{ technitium_dns_zone.zone }}"
  when: technitium_dns_enabled | bool
