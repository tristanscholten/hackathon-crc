---
crc_archive_url: "https://developers.redhat.com/content-gateway/rest/mirror/pub/openshift-v4/clients/crc/latest/crc-linux-amd64.tar.xz"
oc_archive_url: "https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz"
crc_tarball_name: crc-linux-amd64.tar.xz
oc_tarball_name: oc.tar.gz

# CRC canonical names are fixed by CRC/OpenShift Local; these aliases are configurable.
crc_base_domain: testing
crc_api_domain: "{{ crc_cluster_name }}.{{ crc_base_domain }}"
crc_apps_domain: "apps-{{ crc_cluster_name }}.{{ crc_base_domain }}"
crc_api_alias: "api.{{ crc_api_domain }}"
crc_apps_alias: "{{ crc_apps_domain }}"
crc_console_alias: "console-openshift-console.{{ crc_apps_domain }}"
crc_oauth_alias: "oauth-openshift.{{ crc_apps_domain }}"
crc_domain_secret_name: "{{ crc_cluster_name }}-domain-tls"
crc_configure_custom_domains: true

crc_run_user: "{{ ansible_user }}"
crc_run_home: "/home/{{ crc_run_user }}"
crc_download_dir: "{{ crc_run_home }}/Downloads"
crc_user_bin_dir: "{{ crc_run_home }}/bin"
crc_cache_dir: /var/lib/crc-cache-{{ crc_run_user }}
crc_command: "{{ crc_user_bin_dir }}/crc"
oc_command: "{{ crc_user_bin_dir }}/oc"
local_oc_dir: "{{ playbook_dir }}/../.local/bin"
local_oc_command: "{{ local_oc_dir }}/oc"
crc_pull_secret_src: "{{ lookup('env', 'CRC_PULL_SECRET_PATH') | default('~/.hermes/secrets/hackathon-crc-pull-secret.json', true) | expanduser }}"
crc_pull_secret_dest: "{{ crc_run_home }}/.crc-pull-secret.json"

crc_cpus: 8
crc_memory_mib: 24576
crc_disk_size_gib: 80
crc_force_recreate: false

crc_network_mode: user
crc_dns_listen_addresses:
  - "127.0.0.1"
  - "{{ crc_bind_address }}"
crc_enable_dnsmasq: true
crc_enable_haproxy: true
crc_allow_passwordless_sudo_for_setup: true
crc_reboot_after_package_install: true

crc_ubuntu_packages:
  - curl
  - tar
  - xz-utils
  - openssl
  - rsync
  - qemu-kvm
  - qemu-system-x86
  - virtiofsd
  - cpu-checker
  - libvirt-daemon
  - libvirt-daemon-system
  - libvirt-clients
  - virtinst
  - bridge-utils
  - libcap2-bin
  - network-manager
  - haproxy
  - dnsmasq
